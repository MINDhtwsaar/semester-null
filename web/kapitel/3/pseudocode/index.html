<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Pseudocode · Kapitel 3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../../styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <a class="brand-home" href="../">← Kapitel 3</a>
        <span class="brand-mark">Pseudocode</span>
        <span class="brand-sub" id="module-label">Abläufe beschreiben</span>
      </div>
      <div class="progress" aria-live="polite">
        <span id="step-label">1 / 1</span>
        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>
    </header>

    <main class="workspace">
      <section class="panel panel-task" aria-label="Aufgabe">
        <p class="eyebrow" id="task-eyebrow">Aufgabe</p>
        <h1 class="task-title" id="task-title">Laden…</h1>
        <p class="task-body" id="task-body"></p>

        <div class="code-wrap">
          <div class="code-header">
            <span>Pseudocode</span>
            <span class="code-hint">Nur lesen — tippe rechts, dann Ausführen</span>
          </div>
          <pre class="code-block" id="code-block"><code></code></pre>
        </div>

        <div class="actions">
          <button type="button" class="btn btn-primary" id="btn-run" disabled>Ausführen</button>
          <button type="button" class="btn btn-ghost" id="btn-prev" disabled>Zurück</button>
          <button type="button" class="btn btn-secondary" id="btn-next" disabled>Weiter</button>
        </div>
      </section>

      <section class="panel panel-output" aria-label="Frage und Ausgabe">
        <div class="output-header">
          <h2 id="output-heading">Frage</h2>
          <span class="output-badge" id="output-badge">Multiple Choice</span>
        </div>
        <div class="output-stage" id="output-stage">
          <div class="quiz" id="quiz">
            <p class="quiz-prompt" id="quiz-prompt"></p>
            <div class="quiz-options" id="quiz-options" role="radiogroup" aria-labelledby="quiz-prompt"></div>
            <p class="quiz-feedback hidden" id="quiz-feedback" aria-live="polite"></p>
          </div>
          <div class="output-result hidden" id="output-result">
            <p class="result-caption" id="result-caption"></p>
            <div class="table-scroll">
              <table class="data-table" id="data-table"></table>
            </div>
            <p class="result-note" id="result-note"></p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="lessons.js"></script>
  <script src="../../../app.js"></script>
</body>
</html>
